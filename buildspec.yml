version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - cd $CODEBUILD_SRC_DIR/frontend && npm ci
  pre_build:
    commands:
      - cd $CODEBUILD_SRC_DIR/frontend && npm test -- --run
  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/frontend && npm run build
  post_build:
    commands:
      - aws s3 sync $CODEBUILD_SRC_DIR/frontend/dist s3://$S3_BUCKET --delete
      - aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
