version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - cd $CODEBUILD_SRC_DIR/frontend && npm ci
  pre_build:
    commands:
      - cd $CODEBUILD_SRC_DIR/frontend && npm test -- --run
  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/frontend && npm run build
  post_build:
    commands:
      - aws s3 sync $CODEBUILD_SRC_DIR/frontend/dist s3://$S3_BUCKET --delete
      - aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
      - |
        COMMIT_MSG=$(cd $CODEBUILD_SRC_DIR && git log -1 --pretty=format:'%s')
        COMMIT_SHA=$(cd $CODEBUILD_SRC_DIR && git log -1 --pretty=format:'%h')
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d parse_mode=HTML \
          -d text="✅ <b>RunMapRepeat frontend deployed</b>%0A<code>${COMMIT_SHA}</code> ${COMMIT_MSG}"
