name: PR Tests & Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        id: frontend-tests
        working-directory: frontend
        run: npm test -- --run 2>&1 | tee /tmp/frontend-test-output.txt
        continue-on-error: true

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest moto boto3

      - name: Run backend tests
        id: backend-tests
        working-directory: backend
        run: pytest --tb=short 2>&1 | tee /tmp/backend-test-output.txt
        continue-on-error: true

      - name: Install CDK dependencies
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Run CDK tests
        id: cdk-tests
        working-directory: infra
        run: pytest --tb=short 2>&1 | tee /tmp/cdk-test-output.txt
        continue-on-error: true

      - name: Post test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const frontend = '${{ steps.frontend-tests.outcome }}';
            const backend = '${{ steps.backend-tests.outcome }}';
            const cdk = '${{ steps.cdk-tests.outcome }}';
            const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';

            const body = `## 🧪 Test Results\n\n` +
              `| Suite | Status |\n|-------|--------|\n` +
              `| Frontend | ${icon(frontend)} ${frontend} |\n` +
              `| Backend | ${icon(backend)} ${backend} |\n` +
              `| CDK | ${icon(cdk)} ${cdk} |\n`;

            // Find existing test results comment from this bot
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('🧪 Test Results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Gate — fail if any tests failed
        if: always()
        run: |
          if [ "${{ steps.frontend-tests.outcome }}" = "failure" ] || \
             [ "${{ steps.backend-tests.outcome }}" = "failure" ] || \
             [ "${{ steps.cdk-tests.outcome }}" = "failure" ]; then
            echo "❌ One or more test suites failed"
            exit 1
          fi
          echo "✅ All tests passed"

      - name: Notify via Telegram
        if: always()
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            const prUrl = context.payload.pull_request.html_url;
            const prAuthor = context.payload.pull_request.user.login;
            const frontend = '${{ steps.frontend-tests.outcome }}';
            const backend = '${{ steps.backend-tests.outcome }}';
            const cdk = '${{ steps.cdk-tests.outcome }}';

            const message = `🔍 <b>PR Review Needed</b>: #${prNumber} — ${prTitle}\nBy: ${prAuthor}\nTests: Frontend=${frontend} Backend=${backend} CDK=${cdk}\n<a href="${prUrl}">Review PR</a>`;

            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            if (token && chatId) {
              const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  chat_id: chatId,
                  text: message,
                  parse_mode: 'HTML',
                  disable_web_page_preview: true
                })
              });
              if (!response.ok) {
                console.log('Telegram notification failed:', await response.text());
              }
            }

  review:
    name: AI Code Review
    needs: test
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    outputs:
      has_findings: ${{ steps.run-review.outputs.has_findings }}
      findings_json: ${{ steps.run-review.outputs.findings_json }}
      findings_summary: ${{ steps.run-review.outputs.findings_summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3

      - name: Run AI review
        id: run-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          NOTIFY_CHANNEL: "telegram"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python .github/scripts/ai_review.py

  # ================================================================
  # Job 3: Trigger auto-fix via @claude comment
  # ================================================================
  # NOTE: Add the 'no-auto-fix' label to a PR to disable automatic fix attempts.
  # This is useful when findings are false positives or require manual intervention.
  trigger-fix:
    name: Trigger Auto-Fix
    needs: review
    runs-on: ubuntu-latest
    if: >
      needs.review.outputs.has_findings == 'true' &&
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'no-auto-fix')

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check cycle count
        id: cycle
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            // Derive the App bot login from the App ID
            // GitHub App bots are always: <app-name>[bot], but we can also
            // match by user type + marker string to avoid needing the exact name
            const appId = '${{ secrets.APP_ID }}';

            // Check existing @claude fix comments to count cycles
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number }
            );
            const fixComments = comments.filter(c =>
              c.user.type === 'Bot' &&
              c.performed_via_github_app?.id === Number(appId) &&
              c.body.includes('@claude') &&
              c.body.includes('[ai-fix-cycle-')
            );
            const cycle = fixComments.length + 1;
            core.setOutput('cycle', cycle);
            core.setOutput('skip', cycle > 2 ? 'true' : 'false');
            console.log(`Fix cycle: ${cycle}/2 (skip: ${cycle > 2})`);
            console.log(`Found ${fixComments.length} existing fix comments from App ID ${appId}`);

      - name: Post max-cycles comment
        if: steps.cycle.outputs.skip == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Auto-Fix Limit Reached**\n\nMax 2 fix cycles completed. Remaining findings require manual intervention.',
            });

      - name: Post @claude fix comment
        if: steps.cycle.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          FINDINGS_SUMMARY: ${{ needs.review.outputs.findings_summary }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const cycle = '${{ steps.cycle.outputs.cycle }}';
            const findings = process.env.FINDINGS_SUMMARY;
            const body = `@claude [ai-fix-cycle-${cycle}] Fix the following code review findings. ` +
              `Read .github/prompts/fix.md for detailed instructions.\n\n` +
              `**Available tools:** Glob, Grep, LS, Read, Bash (git add, git commit, git push, git rm). ` +
              `Use Bash to write/edit files (e.g. sed, cat, echo). Do NOT attempt to use Write or Edit tools — they are not available.\n\n` +
              `**Rules:**\n` +
              `- Read the PR description to understand the feature context before fixing\n` +
              `- Fix the source code, NOT the tests\n` +
              `- Run tests after each fix (see CLAUDE.md for commands)\n` +
              `- If a fix breaks tests, revert it\n` +
              `- Only keep fixes where all tests still pass\n` +
              `- Commit message must include [ai-fix-cycle-${cycle}]\n\n` +
              `**Findings (cycle ${cycle}/2):**\n\n${findings}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
