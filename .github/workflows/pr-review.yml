name: PR Tests & Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Notify CI started
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            try {
              const prTitle = context.payload.pull_request.title;
              const prNumber = context.payload.pull_request.number;
              const prUrl = context.payload.pull_request.html_url;
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const message = `🔄 <b>CI Started</b> — PR #${prNumber}\n<a href="${prUrl}">${prTitle}</a>\n<a href="${runUrl}">View run</a>`;
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chatId = process.env.TELEGRAM_CHAT_ID;
              if (token && chatId) {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'HTML', disable_web_page_preview: true })
                });
              }
            } catch (e) { console.log('CI start notification error:', e.message); }

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        id: frontend-tests
        working-directory: frontend
        run: npm test -- --run
        continue-on-error: true

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest moto boto3

      - name: Run backend tests
        id: backend-tests
        working-directory: backend
        run: pytest --tb=short
        continue-on-error: true

      - name: Install CDK dependencies
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Run CDK tests
        id: cdk-tests
        working-directory: infra
        run: pytest --tb=short
        continue-on-error: true

      - name: Post test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const frontend = '${{ steps.frontend-tests.outcome }}';
            const backend = '${{ steps.backend-tests.outcome }}';
            const cdk = '${{ steps.cdk-tests.outcome }}';
            const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';

            const body = `## 🧪 Test Results\n\n` +
              `| Suite | Status |\n|-------|--------|\n` +
              `| Frontend | ${icon(frontend)} ${frontend} |\n` +
              `| Backend | ${icon(backend)} ${backend} |\n` +
              `| CDK | ${icon(cdk)} ${cdk} |\n`;

            // Find existing test results comment from this bot
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('🧪 Test Results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Gate — fail if any tests failed
        id: gate
        if: always()
        run: |
          if [ "${{ steps.frontend-tests.outcome }}" = "failure" ] || \
             [ "${{ steps.backend-tests.outcome }}" = "failure" ] || \
             [ "${{ steps.cdk-tests.outcome }}" = "failure" ]; then
            echo "❌ One or more test suites failed"
            exit 1
          fi
          echo "✅ All tests passed"

      - name: Notify CI completed
        if: always()
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            try {
              const prTitle = context.payload.pull_request.title;
              const prNumber = context.payload.pull_request.number;
              const prUrl = context.payload.pull_request.html_url;
              const fe = '${{ steps.frontend-tests.outcome }}';
              const be = '${{ steps.backend-tests.outcome }}';
              const cdk = '${{ steps.cdk-tests.outcome }}';
              const allPassed = fe === 'success' && be === 'success' && cdk === 'success';
              const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';
              const emoji = allPassed ? '✅' : '❌';
              const status = allPassed ? 'Tests Passed' : 'Tests Failed';
              const message = `${emoji} <b>${status}</b> — PR #${prNumber}\n<a href="${prUrl}">${prTitle}</a>\nFrontend ${icon(fe)} | Backend ${icon(be)} | CDK ${icon(cdk)}`;
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chatId = process.env.TELEGRAM_CHAT_ID;
              if (token && chatId) {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'HTML', disable_web_page_preview: true })
                });
              }
            } catch (e) { console.log('CI complete notification error:', e.message); }

  review:
    name: AI Code Review
    needs: test
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    outputs:
      has_findings: ${{ steps.check-findings.outputs.has_findings }}
      findings_summary: ${{ steps.check-findings.outputs.findings_summary }}
      summary_findings_section: ${{ steps.check-findings.outputs.summary_findings_section }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Notify AI review started
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            try {
              const prTitle = context.payload.pull_request.title;
              const prNumber = context.payload.pull_request.number;
              const prUrl = context.payload.pull_request.html_url;
              const message = `🔍 <b>AI Review Started</b> — PR #${prNumber}\n<a href="${prUrl}">${prTitle}</a>`;
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chatId = process.env.TELEGRAM_CHAT_ID;
              if (token && chatId) {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'HTML', disable_web_page_preview: true })
                });
              }
            } catch (e) { console.log('AI review start notification error:', e.message); }

      - name: Run principal-engineer review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          claude_args: "--model arn:aws:bedrock:us-east-1:579083551251:application-inference-profile/x2ntqs4tet2b --max-turns 50 --allowedTools mcp__github_inline_comment__create_inline_comment,Bash(gh:*),Read,Glob,Grep"
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            You are the principal-engineer (tech lead and orchestrator). Review PR #${{ github.event.pull_request.number }}.

            ## Setup — read these files first
            1. `CLAUDE.md` — project context and conventions
            2. `.claude/agents/principal-engineer.md` — your role, perspective, and review format
            3. `.claude/rules/code-quality.md` — architecture and code standards
            4. `.claude/rules/security.md` — security rules, OWASP, STRIDE

            Then based on which files changed, also read:
            - Backend/infra changes → `.claude/rules/infrastructure.md`
            - Frontend changes → `.claude/rules/frontend.md`
            - DynamoDB/data changes → `.claude/rules/backend.md` (backend conventions)

            ## Review process
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see all changes
            2. Read each changed file for full context (not just the diff)
            3. Apply your routing heuristic from principal-engineer.md:
               - For security-sensitive changes (auth, IAM, secrets): apply deep security rules
               - For frontend changes: apply WCAG 2.2, Core Web Vitals, Nielsen's heuristics
               - For architecture/backend: apply AWS patterns, service limits, cost analysis
            4. Post inline comments for CRITICAL/HIGH/MEDIUM findings using `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`
            5. Post a summary comment using `gh pr comment ${{ github.event.pull_request.number }}`

            ## Review rules
            - Only flag real issues (>70% confidence). No noise.
            - Skip: formatting, import order, naming preferences, vague "consider X" suggestions
            - Every finding must have a concrete code fix
            - Max 10 findings, prioritized by severity
            - Diff scope only — don't flag pre-existing issues unless the PR makes them worse
            - Don't review: `cdk.out/`, `node_modules/`, `*.lock`, `dist/`, `__pycache__/`

            ## Severity levels
            🔴 CRITICAL — security vulnerability or data loss (credentials, injection, no auth)
            🟠 HIGH — bug or significant gap (logic error, missing error handling)
            🟡 MEDIUM — quality issue (missing validation, unclear logic, missing test)
            🟢 LOW — improvement opportunity (optimization, naming, optional enhancement)

            ## Summary comment format
            Your `gh pr comment` must follow this structure EXACTLY.
            The FIRST line must be the HTML comment marker: `<!-- review-run:${{ github.run_id }} -->`

            ```
            <!-- review-run:${{ github.run_id }} -->
            ## 🤖 AI Code Review — #<number>: <title>

            *Type: feature|bugfix|refactor|config|docs*

            <1-2 sentence assessment>

            ### Findings: <count by severity>

            | # | Severity | File | Finding |
            |---|----------|------|---------|
            | 1 | 🔴 CRITICAL | `path/to/file` | Brief description |

            See inline comments for details.

            ### Verdict
            ✅ Ready for Merge — no blocking findings
            OR
            ❌ Blocking findings — N issues must be resolved
            ```

            IMPORTANT: The findings TABLE is mandatory even when all findings have inline comments.
            Each row must include severity emoji, file path, and a brief description.
            This table is used as fallback context for the auto-fix agent.

            After posting the summary, if there are any CRITICAL or HIGH findings, output the text HAS_BLOCKING_FINDINGS on its own line as your final message.
            If no blocking findings, output NO_BLOCKING_FINDINGS.

      - name: Check for blocking findings
        id: check-findings
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const runId = '${{ github.run_id }}';
            const reviewOutcome = '${{ steps.review.outcome }}';

            // Gate 1: review step must have succeeded
            if (reviewOutcome !== 'success') {
              core.setFailed(`Review step failed with outcome: ${reviewOutcome}`);
              core.setOutput('has_findings', 'false');
              return;
            }

            // Gate 2: find the summary comment FROM THIS RUN (not stale ones)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 50,
            });

            // Match by run_id marker injected by the review prompt
            const runMarker = `<!-- review-run:${runId} -->`;
            const summaryComment = comments.data.reverse().find(c =>
              c.body.includes(runMarker) &&
              (c.user.login === 'github-actions[bot]' || c.user.login === 'runmaprepeat-autofix[bot]')
            );

            if (!summaryComment) {
              core.setFailed('Review completed but principal-engineer did not post a summary comment for this run. Review may have been a no-op.');
              core.setOutput('has_findings', 'false');
              return;
            }

            console.log(`Found summary comment #${summaryComment.id} created at ${summaryComment.created_at}`);

            // Gate 3: summary must contain a verdict
            const hasVerdict = summaryComment.body.includes('Ready for Merge') ||
                               summaryComment.body.includes('Blocking findings');
            if (!hasVerdict) {
              core.setFailed('Summary comment exists but missing verdict (Ready for Merge / Blocking findings). Review may be incomplete.');
              core.setOutput('has_findings', 'false');
              return;
            }

            const hasBlockers = summaryComment.body.includes('❌ Blocking findings');

            // Extract findings from inline review comments — ONLY from this review cycle
            const headSha = '${{ github.event.pull_request.head.sha }}';
            const reviews = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 50,
            });

            const botComments = reviews.data.filter(c =>
              (c.user.login === 'github-actions[bot]' || c.user.login === 'runmaprepeat-autofix[bot]') &&
              c.commit_id === headSha
            );

            // Split by severity — from inline comments
            let blockerFindings = botComments
              .filter(c => c.body.includes('🔴') || c.body.includes('🟠'))
              .map(c => `- [${c.path}:${c.line || c.original_line}] ${c.body.substring(0, 300)}`)
              .join('\n');

            let allFindings = botComments
              .filter(c => c.body.includes('🔴') || c.body.includes('🟠') || c.body.includes('🟡') || c.body.includes('🟢'))
              .map(c => `- [${c.path}:${c.line || c.original_line}] ${c.body.substring(0, 300)}`)
              .join('\n');

            // FALLBACK: if verdict says blocking but inline comments are empty,
            // extract findings from the summary comment table
            if (hasBlockers && !blockerFindings) {
              console.log('⚠️ Verdict says blocking but no inline comments found — extracting from summary table');
              const tableRows = summaryComment.body.match(/\|[^|]*\|[^|]*(🔴|🟠)[^|]*\|[^|]*\|[^|]*\|/g);
              if (tableRows && tableRows.length > 0) {
                blockerFindings = tableRows
                  .map(row => `- ${row.replace(/\|/g, ' ').trim()}`)
                  .join('\n');
                console.log(`Extracted ${tableRows.length} blocker findings from summary table`);
              }

              // Also extract all findings from table
              const allTableRows = summaryComment.body.match(/\|[^|]*\|[^|]*(🔴|🟠|🟡|🟢)[^|]*\|[^|]*\|[^|]*\|/g);
              if (allTableRows && allTableRows.length > 0 && !allFindings) {
                allFindings = allTableRows
                  .map(row => `- ${row.replace(/\|/g, ' ').trim()}`)
                  .join('\n');
              }
            }

            core.setOutput('has_findings', hasBlockers ? 'true' : 'false');
            core.setOutput('findings_summary', blockerFindings || 'No findings extracted');
            core.setOutput('all_findings_summary', allFindings || 'No findings');

            // Also pass the full summary comment body as fallback context for auto-fix
            if (hasBlockers) {
              // Extract just the findings section from summary for richer context
              const findingsSection = summaryComment.body.match(/### Findings[\s\S]*?(?=### Verdict|$)/);
              core.setOutput('summary_findings_section', findingsSection ? findingsSection[0].substring(0, 2000) : '');
            }

            console.log(`✅ Review validated: verdict=${hasBlockers ? 'blocking' : 'clean'}, inline=${botComments.length}, fallback=${!blockerFindings ? 'used' : 'not needed'}`);

            // Gate 4: FAIL the check if there are blocking findings
            if (hasBlockers) {
              core.setFailed(`❌ AI Review found blocking findings (CRITICAL/HIGH). Fix before merging.`);
            }

      # NOTE: Medium findings are reported as inline PR comments only.
      # No longer auto-creating issues — it was too noisy.
      # CRITICAL/HIGH findings block the PR via the check-findings gate.

      - name: Notify via Telegram
        if: always() && steps.review.outcome != 'cancelled'
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALL_FINDINGS: ${{ steps.check-findings.outputs.all_findings_summary }}
          HAS_BLOCKERS: ${{ steps.check-findings.outputs.has_findings }}
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
        with:
          script: |
            try {
              const prTitle = context.payload.pull_request.title;
              const prNumber = context.payload.pull_request.number;
              const prUrl = context.payload.pull_request.html_url;
              const hasBlockers = process.env.HAS_BLOCKERS === 'true';
              const reviewOutcome = process.env.REVIEW_OUTCOME;
              const allFindings = process.env.ALL_FINDINGS || '';

              let emoji, status;
              if (reviewOutcome !== 'success') {
                emoji = '⚠️'; status = 'Review Failed';
              } else if (hasBlockers) {
                emoji = '🔍'; status = 'Blocking Findings';
              } else {
                emoji = '✅'; status = 'Ready for Merge';
              }

              let message = `${emoji} <b>AI Review</b> — PR #${prNumber} — ${status}\n<a href="${prUrl}">${prTitle}</a>`;

              // Include all findings summary in notification — escape HTML
              if (allFindings && allFindings !== 'No findings') {
                const escaped = allFindings
                  .replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/`/g, '');
                const lines = escaped.split('\n').filter(l => l.trim()).slice(0, 5);
                const truncated = lines.join('\n') + (escaped.split('\n').filter(l => l.trim()).length > 5 ? '\n...' : '');
                message += `\n\n<pre>${truncated.substring(0, 500)}</pre>`;
              }

              // Telegram max message length is 4096
              if (message.length > 4096) {
                message = message.substring(0, 4090) + '…</pre>';
              }

              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chatId = process.env.TELEGRAM_CHAT_ID;
              if (token && chatId) {
                console.log(`Sending Telegram notification (${message.length} chars)`);
                const resp = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    chat_id: chatId, text: message,
                    parse_mode: 'HTML', disable_web_page_preview: true
                  })
                });
                if (!resp.ok) {
                  const errText = await resp.text();
                  console.log(`Telegram notification failed (${resp.status}): ${errText}`);
                  // Retry without HTML parse mode
                  const retryResp = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      chat_id: chatId,
                      text: message.replace(/<[^>]+>/g, ''),
                      disable_web_page_preview: true
                    })
                  });
                  if (!retryResp.ok) {
                    console.log('Telegram retry also failed:', await retryResp.text());
                  } else {
                    console.log('Telegram retry (plain text) succeeded');
                  }
                } else {
                  console.log('Telegram notification sent successfully');
                }
              } else {
                console.log('Telegram credentials not configured — skipping');
              }
            } catch (e) {
              console.log('Telegram notification error:', e.message);
            }

  # ================================================================
  # Job 3: Trigger auto-fix via @claude comment
  # ================================================================
  # NOTE: Add the 'no-auto-fix' label to a PR to disable automatic fix attempts.
  # This is useful when findings are false positives or require manual intervention.
  trigger-fix:
    name: Trigger Auto-Fix
    needs: review
    runs-on: ubuntu-latest
    if: >
      always() &&
      needs.review.result != 'cancelled' &&
      needs.review.outputs.has_findings == 'true' &&
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'no-auto-fix')

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check cycle count
        id: cycle
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            // Derive the App bot login from the App ID
            // GitHub App bots are always: <app-name>[bot], but we can also
            // match by user type + marker string to avoid needing the exact name
            const appId = '${{ secrets.APP_ID }}';

            // Check existing @claude fix comments to count cycles
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number }
            );
            const fixComments = comments.filter(c =>
              c.user.type === 'Bot' &&
              c.performed_via_github_app?.id === Number(appId) &&
              c.body.includes('@claude') &&
              c.body.includes('[ai-fix-cycle-')
            );
            const cycle = fixComments.length + 1;
            core.setOutput('cycle', cycle);
            core.setOutput('skip', cycle > 2 ? 'true' : 'false');
            console.log(`Fix cycle: ${cycle}/2 (skip: ${cycle > 2})`);
            console.log(`Found ${fixComments.length} existing fix comments from App ID ${appId}`);

      - name: Post max-cycles comment
        if: steps.cycle.outputs.skip == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Auto-Fix Limit Reached**\n\nMax 2 fix cycles completed. Remaining findings require manual intervention.',
            });

      - name: Post @claude fix comment
        if: steps.cycle.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          FINDINGS_SUMMARY: ${{ needs.review.outputs.findings_summary }}
          SUMMARY_SECTION: ${{ needs.review.outputs.summary_findings_section }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const cycle = '${{ steps.cycle.outputs.cycle }}';
            const inlineFindings = process.env.FINDINGS_SUMMARY;
            const summarySection = process.env.SUMMARY_SECTION;

            // Use inline findings if available, otherwise fall back to summary table
            let findings = inlineFindings;
            let source = 'inline review comments';
            if (!inlineFindings || inlineFindings === 'No findings extracted') {
              findings = summarySection || 'No detailed findings available — check the AI review summary comment above for context.';
              source = 'summary comment table (inline comments were not created)';
            }

            const body = [
              `@claude [ai-fix-cycle-${cycle}] You are the principal-engineer (tech lead). Fix the following code review findings.`,
              '',
              '**Setup — read these files first:**',
              '1. `CLAUDE.md` — project context',
              '2. `.claude/agents/principal-engineer.md` — your role and standards',
              '3. `.claude/rules/code-quality.md` — architecture standards',
              '4. Read additional `.claude/rules/` files based on which files need fixing (security.md, frontend.md, infrastructure.md, backend.md)',
              '',
              '**Process:**',
              '1. Read each finding carefully — understand the root cause before changing anything',
              '2. Establish baseline: run all test suites first',
              '   - Frontend: `cd frontend && npm ci && npm test -- --run`',
              '   - Backend: `cd backend && pip install pytest moto boto3 && pytest --tb=short`',
              '   - CDK: `cd infra && pip install -r requirements.txt && pytest --tb=short`',
              '3. For each finding, use red/green TDD:',
              '   - Write a failing test that reproduces the issue (red)',
              '   - Implement the fix (green)',
              '   - Run tests to confirm no regressions',
              '4. If a fix breaks tests, revert it and move on',
              '5. After all fixes, manually verify: curl affected APIs or build frontend',
              `6. Commit message must include [ai-fix-cycle-${cycle}]`,
              '',
              '**Rules:**',
              '- Fix the source code, NOT the tests',
              '- Keep fixes minimal and focused — don\'t refactor surrounding code',
              '- For CRITICAL findings, add a brief code comment explaining the fix',
              '- Do not modify infrastructure code unless the finding specifically targets it',
              '',
              `**Findings (cycle ${cycle}/2) — source: ${source}:**`,
              '',
              findings,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });


