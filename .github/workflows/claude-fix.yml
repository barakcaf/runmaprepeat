name: Claude Auto-Fix

on:
  issue_comment:
    types: [created]

concurrency:
  group: claude-fix-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

# NOTE: Add the 'no-auto-fix' label to a PR to disable automatic fix attempts.
# This is useful when findings are false positives or require manual intervention.
jobs:
  fix:
    name: Claude Code Fix
    runs-on: ubuntu-latest
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      (
        github.event.comment.user.login == 'github-actions[bot]' ||
        github.event.comment.user.login == 'runmaprepeat-autofix[bot]'
      ) &&
      !contains(github.event.issue.labels.*.name, 'no-auto-fix')

    steps:
      - name: Configure AWS credentials (OIDC)
        id: configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        id: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Run Claude Code
        id: claude-fix
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          claude_args: "--model arn:aws:bedrock:us-east-1:579083551251:application-inference-profile/jk8gcjrpuokf --max-turns 30"
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@claude"
          allowed_bots: "runmaprepeat-autofix[bot],github-actions[bot]"
          bot_id: "270995726"
          bot_name: "runmaprepeat-autofix"

      - name: Gather fix summary
        if: always()
        id: summary
        uses: actions/github-script@v7
        with:
          # No github-token here — summary must work even when app-token step failed.
          # Default GITHUB_TOKEN is used for PR detail lookups (commit msg, files changed).
          # If it lacks access, the try/catch in the success branch handles it gracefully.
          script: |
            try {
              const prNumber = context.payload.issue.number;
              const prTitle = context.payload.issue.title;
              const prUrl = context.payload.issue.html_url;
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

              const oidcOutcome = '${{ steps.configure-aws-credentials.outcome }}' || 'skipped';
              const tokenOutcome = '${{ steps.app-token.outcome }}' || 'skipped';
              const checkoutOutcome = '${{ steps.checkout.outcome }}' || 'skipped';
              const fixOutcome = '${{ steps.claude-fix.outcome }}' || 'skipped';

              const commentBody = context.payload.comment.body || '';
              const cycleMatch = commentBody.match(/\[ai-fix-cycle-(\d+)\]/);
              const cycle = cycleMatch ? cycleMatch[1] : '?';

              // Check for infrastructure failures first
              if (oidcOutcome !== 'success') {
                const msg = `❌ <b>Auto-Fix Error</b>: #${prNumber} — ${prTitle}\nCycle ${cycle}: AWS OIDC auth failed (${oidcOutcome})\n<a href="${runUrl}">View logs</a> | <a href="${prUrl}">View PR</a>`;
                core.setOutput('message', msg);
                return;
              }
              if (tokenOutcome !== 'success') {
                const msg = `❌ <b>Auto-Fix Error</b>: #${prNumber} — ${prTitle}\nCycle ${cycle}: GitHub App token generation failed (${tokenOutcome})\n<a href="${runUrl}">View logs</a> | <a href="${prUrl}">View PR</a>`;
                core.setOutput('message', msg);
                return;
              }
              if (checkoutOutcome !== 'success') {
                const msg = `❌ <b>Auto-Fix Error</b>: #${prNumber} — ${prTitle}\nCycle ${cycle}: Checkout failed (${checkoutOutcome})\n<a href="${runUrl}">View logs</a> | <a href="${prUrl}">View PR</a>`;
                core.setOutput('message', msg);
                return;
              }

              // Parse findings from the trigger comment
              // Format: **Findings (cycle N/M) — source: ...:**, or without bold markers
              const findingsMatch = commentBody.match(/\*{0,2}Findings \(cycle \d+\/\d+\)[^:]*:\*{0,2}\s*\n\n([\s\S]*)/);
              const findingsText = findingsMatch ? findingsMatch[1] : '';
              const criticalCount = (findingsText.match(/🔴/g) || []).length;
              const highCount = (findingsText.match(/🟠/g) || []).length;
              const mediumCount = (findingsText.match(/🟡/g) || []).length;
              const totalFindings = criticalCount + highCount + mediumCount;

              let emoji, status, details;

              if (fixOutcome === 'success') {
                // Try to get commit details
                let filesChanged = 0;
                let commitMsg = '';
                try {
                  const token = '${{ steps.app-token.outputs.token }}';
                  if (token) {
                    const { data: pr } = await github.rest.pulls.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber,
                    });
                    const { data: commits } = await github.rest.pulls.listCommits({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber,
                      per_page: 5,
                    });
                    const latest = commits[commits.length - 1];
                    if (latest) {
                      commitMsg = latest.commit.message.split('\n')[0];
                      filesChanged = pr.changed_files;
                    }
                  }
                } catch (e) {
                  console.log('Could not fetch PR details:', e.message);
                }

                emoji = '🔧';
                status = 'Auto-Fix Applied';
                if (totalFindings > 0) {
                  details = `Cycle ${cycle}: ${totalFindings} finding${totalFindings !== 1 ? 's' : ''} addressed`;
                  if (criticalCount > 0) details += ` (${criticalCount} CRITICAL, ${highCount} HIGH)`;
                  else if (highCount > 0) details += ` (${highCount} HIGH, ${mediumCount} MEDIUM)`;
                } else {
                  details = `Cycle ${cycle}: findings addressed`;
                }
                if (commitMsg) details += `\nCommit: ${commitMsg}`;
                if (filesChanged > 0) details += `\nFiles changed: ${filesChanged}`;
              } else if (fixOutcome === 'skipped') {
                emoji = '⏭️';
                status = 'Auto-Fix Skipped';
                details = `Cycle ${cycle}: Claude Code step was skipped`;
              } else if (fixOutcome === 'cancelled') {
                emoji = '🚫';
                status = 'Auto-Fix Cancelled';
                details = `Cycle ${cycle}: Run was cancelled (possibly by concurrency group)`;
              } else {
                // failure or unknown
                emoji = '⚠️';
                status = 'Auto-Fix Failed';
                if (totalFindings > 0) {
                  details = `Cycle ${cycle}: Claude could not resolve ${totalFindings} finding${totalFindings !== 1 ? 's' : ''}`;
                  if (criticalCount > 0) details += ` (${criticalCount} CRITICAL, ${highCount} HIGH)`;
                  else if (highCount > 0) details += ` (${highCount} HIGH)`;
                } else {
                  details = `Cycle ${cycle}: Claude could not resolve findings`;
                }
              }

              const message = `${emoji} <b>${status}</b>: #${prNumber} — ${prTitle}\n${details}\n<a href="${runUrl}">View logs</a> | <a href="${prUrl}">View PR</a>`;
              core.setOutput('message', message);
            } catch (e) {
              // Last resort — if everything above throws, still produce a message
              const prNumber = context.payload.issue.number;
              const prTitle = context.payload.issue.title;
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const msg = `💥 <b>Auto-Fix Crashed</b>: #${prNumber} — ${prTitle}\nSummary step error: ${e.message}\n<a href="${runUrl}">View logs</a>`;
              core.setOutput('message', msg);
            }

      - name: Notify via Telegram
        if: always()
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY_MESSAGE: ${{ steps.summary.outputs.message }}
        with:
          script: |
            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            if (!token || !chatId) {
              console.log('Telegram credentials not configured — skipping notification');
              return;
            }

            let message = process.env.NOTIFY_MESSAGE;

            // Fallback: if summary step didn't produce a message (crashed before output)
            if (!message) {
              const prNumber = context.payload.issue.number;
              const prTitle = context.payload.issue.title;
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              message = `💥 <b>Auto-Fix Error</b>: #${prNumber} — ${prTitle}\nWorkflow failed before producing a summary.\n<a href="${runUrl}">View logs</a>`;
            }

            try {
              const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  chat_id: chatId,
                  text: message,
                  parse_mode: 'HTML',
                  disable_web_page_preview: true
                })
              });
              if (!response.ok) {
                const errText = await response.text();
                console.log(`Telegram API error (${response.status}): ${errText}`);
                // Retry without HTML parse_mode in case message has bad markup
                const retryResp = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    chat_id: chatId,
                    text: message.replace(/<[^>]+>/g, ''),
                    disable_web_page_preview: true
                  })
                });
                if (!retryResp.ok) {
                  console.log('Telegram retry also failed:', await retryResp.text());
                }
              }
            } catch (e) {
              console.log('Telegram notification threw:', e.message);
            }
