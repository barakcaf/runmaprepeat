name: PR Review Notification

on:
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    name: Notify on PR Review
    runs-on: ubuntu-latest
    if: github.event.review.user.login != github.event.pull_request.user.login
    steps:
      - name: Send notification
        run: |
          REVIEW_STATE="${{ github.event.review.state }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          REVIEWER="${{ github.event.review.user.login }}"

          if [ "$REVIEW_STATE" = "changes_requested" ]; then
            EMOJI="❌"
            ACTION="requested changes on"
          elif [ "$REVIEW_STATE" = "approved" ]; then
            EMOJI="✅"
            ACTION="approved"
          else
            EMOJI="💬"
            ACTION="commented on"
          fi

          MESSAGE="${EMOJI} <b>PR #${PR_NUMBER}:</b> ${PR_TITLE}%0A${REVIEWER} ${ACTION} this PR.%0A<a href=\"${PR_URL}\">View PR</a>"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"
