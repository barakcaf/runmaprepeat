name: PR Review Notification

on:
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    name: Notify on PR Review
    runs-on: ubuntu-latest
    # Only notify for human reviews — bot reviews (AI code review) have their own
    # notification in pr-review.yml. This prevents duplicate Telegram messages.
    if: >
      github.event.review.user.login != github.event.pull_request.user.login &&
      github.event.review.user.type != 'Bot'
    steps:
      - name: Send notification
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            const reviewState = context.payload.review.state;
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            const prUrl = context.payload.pull_request.html_url;
            const reviewer = context.payload.review.user.login;

            let emoji, action;
            if (reviewState === 'changes_requested') {
              emoji = '❌';
              action = 'requested changes on';
            } else if (reviewState === 'approved') {
              emoji = '✅';
              action = 'approved';
            } else {
              emoji = '💬';
              action = 'commented on';
            }

            const message = `${emoji} <b>PR #${prNumber}:</b> ${prTitle}\n${reviewer} ${action} this PR.\n<a href="${prUrl}">View PR</a>`;

            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            if (token && chatId) {
              const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  chat_id: chatId,
                  text: message,
                  parse_mode: 'HTML',
                  disable_web_page_preview: true
                })
              });
              if (!response.ok) {
                console.log('Telegram notification failed:', await response.text());
              }
            }
